services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: conversation
      POSTGRES_USER: conversation
      POSTGRES_PASSWORD: conversation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres_data:
